<!DOCTYPE html>

<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;family=JetBrains+Mono:wght@500&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;family=JetBrains+Mono:wght@100..900&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .glass-panel {
            background: rgba(23, 31, 51, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(218, 226, 253, 0.05);
        }
        .outer-glow:focus-within {
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.15);
        }
        @keyframes subtle-pulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }
        .pulse-accent {
            animation: subtle-pulse 4s infinite ease-in-out;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-background": "#dae2fd",
                      "surface-tint": "#adc6ff",
                      "inverse-primary": "#005ac2",
                      "outline-variant": "#424754",
                      "surface-bright": "#31394d",
                      "surface": "#0b1326",
                      "on-secondary": "#003824",
                      "secondary": "#4edea3",
                      "secondary-container": "#00a572",
                      "background": "#0b1326",
                      "secondary-fixed-dim": "#4edea3",
                      "secondary-fixed": "#6ffbbe",
                      "on-primary-fixed": "#001a42",
                      "error-container": "#93000a",
                      "tertiary-fixed": "#e9ddff",
                      "surface-dim": "#0b1326",
                      "on-error-container": "#ffdad6",
                      "on-tertiary-fixed-variant": "#5516be",
                      "tertiary": "#d0bcff",
                      "primary-fixed": "#d8e2ff",
                      "primary-container": "#4d8eff",
                      "on-secondary-fixed": "#002113",
                      "primary": "#adc6ff",
                      "surface-variant": "#2d3449",
                      "outline": "#8c909f",
                      "on-tertiary-fixed": "#23005c",
                      "on-secondary-container": "#00311f",
                      "on-primary-fixed-variant": "#004395",
                      "error": "#ffb4ab",
                      "tertiary-fixed-dim": "#d0bcff",
                      "on-tertiary-container": "#340080",
                      "inverse-surface": "#dae2fd",
                      "on-tertiary": "#3c0091",
                      "on-secondary-fixed-variant": "#005236",
                      "surface-container-lowest": "#060e20",
                      "inverse-on-surface": "#283044",
                      "surface-container": "#171f33",
                      "on-error": "#690005",
                      "surface-container-high": "#222a3d",
                      "surface-container-highest": "#2d3449",
                      "tertiary-container": "#a078ff",
                      "primary-fixed-dim": "#adc6ff",
                      "on-surface": "#dae2fd",
                      "on-primary-container": "#00285d",
                      "on-primary": "#002e6a",
                      "on-surface-variant": "#c2c6d6",
                      "surface-container-low": "#131b2e"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "base": "4px",
                      "sm": "8px",
                      "md": "16px",
                      "margin-desktop": "40px",
                      "gutter": "16px",
                      "margin-mobile": "16px",
                      "xl": "32px",
                      "xs": "4px",
                      "lg": "24px"
              },
              "fontFamily": {
                      "headline-lg": ["Inter"],
                      "body-sm": ["Inter"],
                      "label-caps": ["Inter"],
                      "label-mono": ["JetBrains Mono"],
                      "display-currency": ["Inter"],
                      "body-lg": ["Inter"],
                      "headline-md": ["Inter"],
                      "display-currency-mobile": ["Inter"]
              },
              "fontSize": {
                      "headline-lg": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                      "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                      "label-caps": ["11px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700"}],
                      "label-mono": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                      "display-currency": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                      "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                      "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                      "display-currency-mobile": ["32px", {"lineHeight": "36px", "fontWeight": "700"}]
              }
            },
          },
        }
    </script>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center p-md overflow-hidden relative selection:bg-primary-container selection:text-on-primary-container">
<!-- Atmospheric Background Elements -->
<div class="absolute inset-0 pointer-events-none overflow-hidden">
<div class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] bg-primary/10 rounded-full blur-[120px] pulse-accent"></div>
<div class="absolute -bottom-[20%] -right-[10%] w-[40%] h-[40%] bg-secondary/5 rounded-full blur-[100px] pulse-accent"></div>
<div class="absolute inset-0 bg-[linear-gradient(rgba(218,226,253,0.02)_1px,transparent_1px),linear-gradient(90deg,rgba(218,226,253,0.02)_1px,transparent_1px)] bg-[size:40px_40px]"></div>
</div>
<!-- Main Onboarding Container -->
<main class="relative z-10 w-full max-w-[480px]">
<!-- Header Section -->
<header class="text-center mb-xl space-y-md">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-xl bg-surface-container-high border border-outline-variant/20 mb-sm">
<span class="material-symbols-outlined text-primary text-[32px]" data-icon="corporate_fare">corporate_fare</span>
</div>
<h1 class="font-headline-lg text-headline-lg tracking-tight text-on-surface">
                Empresa Clicker
            </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-[320px] mx-auto">
                Sua jornada de freelancer a multinacional começa aqui.
            </p>
</header>
<!-- Form Section -->
<section class="glass-panel p-xl rounded-xl shadow-2xl space-y-lg">
<div class="space-y-sm">
<label class="font-label-caps text-label-caps text-outline uppercase tracking-widest block px-xs" for="company_name">
                    Define o nome da sua empresa
                </label>
<div class="relative group outer-glow">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="domain">domain</span>
</div>
<input class="w-full bg-surface-container-lowest border border-outline-variant/30 text-on-surface font-body-lg text-body-lg rounded-lg py-md pl-[52px] pr-md focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-outline-variant" id="company_name" placeholder="Ex: Globex Corp" type="text"/>
</div>
</div>
<div class="space-y-md">
<button class="w-full bg-primary hover:bg-primary-container text-on-primary font-headline-md text-headline-md py-md rounded-lg flex items-center justify-center gap-sm transition-all active:scale-[0.98] group shadow-lg shadow-primary/10" id="start_button">
<span>Iniciar Operações</span>
<span class="material-symbols-outlined transition-transform group-hover:translate-x-1" data-icon="arrow_forward">arrow_forward</span>
</button>
<div class="flex items-center gap-sm justify-center">
<span class="h-[1px] flex-1 bg-outline-variant/20"></span>
<span class="font-label-mono text-label-mono text-outline uppercase">Acesso Autorizado</span>
<span class="h-[1px] flex-1 bg-outline-variant/20"></span>
</div>
</div>
</section>
<!-- Footer / Subtle Branding -->
<footer class="mt-xl text-center space-y-sm">
<div class="flex justify-center gap-md">
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-[14px] text-secondary" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="font-label-mono text-label-mono text-outline">Protocolo Seguro</span>
</div>
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-[14px] text-primary" data-icon="monitoring" style="font-variation-settings: 'FILL' 1;">monitoring</span>
<span class="font-label-mono text-label-mono text-outline">Executive Pulse v1.0</span>
</div>
</div>
</footer>
</main>
<!-- Decorative Image Panel (Glassmorphic Card with Visual Context) -->
<div class="fixed bottom-0 right-0 p-xl hidden lg:block">
<div class="glass-panel w-[320px] rounded-xl overflow-hidden border border-outline-variant/10 shadow-2xl">
<img alt="Dashboard Preview" class="w-full h-40 object-cover opacity-60 grayscale hover:grayscale-0 hover:opacity-100 transition-all duration-700" data-alt="A highly sophisticated and minimalist corporate financial dashboard displayed on a dark sleek interface. The screen features glowing blue and cyan sparklines, dense data grids, and glassmorphic panels against a deep charcoal background. The overall aesthetic is professional, modern, and data-rich, evoking the feeling of a futuristic mission control center for global business operations." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDQBFaUdueC9y85cvpUq6GTIdVBWh9gSlXh2OMVyiupgskBdHY1Z1QKavz_LJiGp5Guq0BIgXhU_IXlc3XojMi62E_X_YUcIeKQfS98VBqNOoxUaydBqmzEi3Zs9RvBG1uKp3jvVoF3pFa9NuNWSgLgAVVdZdMLloo8NkvATBboDw9bkBtz9aHht7RjQeLP9Z52LMFOZG7mqmfSo6OMG8cdbDNjZEglNu8c6m_tJUG1np803Ditqydw6AzrWf49LQnzaGvygTMyWkPc"/>
<div class="p-md">
<p class="font-label-caps text-label-caps text-primary mb-xs">PRÉVIA DO TERMINAL</p>
<p class="font-body-sm text-body-sm text-on-surface-variant">Monitore KPIs globais em tempo real conforme sua empresa escala de local para global.</p>
</div>
</div>
</div>
<script>
        // Micro-interaction for input focus and button state
        const input = document.getElementById('company_name');
        const button = document.getElementById('start_button');

        input.addEventListener('input', (e) => {
            if (e.target.value.length > 2) {
                button.classList.remove('opacity-50', 'cursor-not-allowed');
                button.classList.add('hover:shadow-primary/20');
            } else {
                // button.classList.add('opacity-50', 'cursor-not-allowed');
            }
        });

        // Atmosphere Sound effect simulation (UI context only)
        button.addEventListener('click', () => {
            if(input.value.trim() !== "") {
                button.innerHTML = `
                    <span class="material-symbols-outlined animate-spin" data-icon="sync">sync</span>
                    <span>Inicializando...</span>
                `;
                button.classList.add('pointer-events-none');
                
                // Simulate transition to dashboard
                setTimeout(() => {
                    document.body.style.opacity = '0';
                    document.body.style.transition = 'opacity 0.8s ease';
                }, 1000);
            } else {
                input.classList.add('border-error');
                setTimeout(() => input.classList.remove('border-error'), 500);
            }
        });
    </script>
</body></html>
